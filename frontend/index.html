<!DOCTYPE html>
<html>
<head>
  <title>Radar Viewer</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<div id="controls">
  <select id="product">
    <option value="REF">Reflectivity</option>
    <option value="VEL">Velocity</option>
    <option value="CC">Correlation Coefficient</option>
  </select>

  <button onclick="toggleAlerts()">Toggle Alerts</button>
  <button onclick="toggleSPC()">Toggle SPC</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
